name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (macOS, arm64)
    runs-on: macos-14

    env:
      PROJECT: MaterialColors.xcodeproj
      SCHEME: MaterialColors

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build (Debug)
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Build & export (Release)
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build/dd \
            CONFIGURATION_BUILD_DIR="$PWD/build/Release-export" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package app bundle
        run: |
          cd build/Release-export
          ditto -c -k --sequesterRsrc --keepParent MaterialColors.app ../MaterialColors.zip
          cd ..
          ls -lh MaterialColors.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: MaterialColors-app
          path: build/MaterialColors.zip
          if-no-files-found: error
          retention-days: 14
